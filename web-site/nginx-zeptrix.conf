server {
    listen 80;
    listen [::]:80;
    server_name zeptrix.io www.zeptrix.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name zeptrix.io www.zeptrix.io;

    ssl_certificate /etc/letsencrypt/live/zeptrix.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zeptrix.io/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    location /api/register {
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /fast-site/ {
        return 301 /fast-site;
    }

    location = /wordpress-to-modern-websites {
        return 301 /fast-site;
    }

    location = /wordpress-to-modern-websites/ {
        return 301 /fast-site;
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location = /aws-cost-reduction {
        try_files /aws-cost-reduction.html =404;
    }
}
